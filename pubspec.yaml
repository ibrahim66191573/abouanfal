name: abouanfal
description: "Application de commande de produits à base de poulet - Abouanfal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

  # Etat de l'application
  provider: ^6.1.2

  # Firebase (backend, auth, base de données, notifications)
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_storage: ^12.1.0
  firebase_messaging: ^15.0.1
  cloud_functions: ^5.0.1

  # Carte & localisation GPS
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  geocoding: ^3.0.0

  # UI / UX
  google_fonts: ^6.2.1
  carousel_slider: ^5.0.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10

  # Notifications locales (statut de commande)
  flutter_local_notifications: ^17.2.1

flutter:
  uses-material-design: true
  generate: true   # active la génération des traductions depuis les fichiers .arb
  assets:
    - assets/images/
    - assets/icons/
